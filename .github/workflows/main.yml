name: Build Android APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Install Dependencies
        run: |
          npm install --legacy-peer-deps
          # Memastikan assets generator terinstall untuk dijalankan npx
          npm install @capacitor/assets @capacitor/cli --save-dev

      - name: Build Next.js
        run: npm run build

      - name: Install Capacitor & Build APK
        run: |
          # Buat folder android jika belum ada
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          
          # Jalankan generator assets dan sync
          npx @capacitor/assets generate --android
          npx cap sync android
          
          # Masuk ke folder android dan build APK
          cd android && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Install Dependencies
        run: |
          npm install --legacy-peer-deps
          npm install @capacitor/core --legacy-peer-deps
          npm install @capacitor/cli @capacitor/android @capacitor/assets --save-dev --legacy-peer-deps

      - name: Build Next.js (Export Static)
        run: |
          npm run build

      - name: Capacitor Setup & Build APK
        run: |
          if [ ! -d "assets" ]; then
            mkdir assets
          fi

          if [ ! -f "capacitor.config.json" ] && [ ! -f "capacitor.config.ts" ]; then
            echo '{"appId": "com.edinst.app", "appName": "DailyMind", "webDir": "out"}' > capacitor.config.json
          fi

          if [ ! -d "android" ]; then
            npx cap add android
          fi

          npx @capacitor/assets generate --android || true
          npx cap sync android
          cd android && ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DailyMind-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
